<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: var(--font-body); padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
  .family { padding: 12px 14px; border-radius: 6px; border: 1px solid var(--color-dark-100); }
  .family-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-blue-700); margin-bottom: 6px; }
  .specimen { color: var(--color-dark-800); }
  .weights { display: flex; gap: 16px; margin-top: 6px; }
  .w { font-size: 13px; color: var(--color-dark-400); }
</style>
</head><body>
<div class="family">
  <div class="family-label">Barlow Condensed — Display / Headings</div>
  <div class="specimen" style="font-family:var(--font-display);font-size:36px;font-weight:700;line-height:1.1;letter-spacing:-0.02em;">ABCDEFGHIJKLMNOPQRSTUVWXYZ<br>abcdefghijklmnopqrstuvwxyz 0123456789</div>
  <div class="weights">
    <span class="w" style="font-family:var(--font-display);font-weight:600;">SemiBold 600</span>
    <span class="w" style="font-family:var(--font-display);font-weight:700;">Bold 700</span>
  </div>
</div>
<div class="family">
  <div class="family-label">Barlow — Body / UI</div>
  <div class="specimen" style="font-family:var(--font-body);font-size:18px;font-weight:400;line-height:1.55;">Klimatyzacja · Ogrzewacze Postojowe · Serwis Autoryzowany<br>Diagnostyka, naprawy, montaż — Wrocław od 2001 roku.</div>
  <div class="weights">
    <span class="w" style="font-family:var(--font-body);font-weight:400;">Regular 400</span>
    <span class="w" style="font-family:var(--font-body);font-weight:500;">Medium 500</span>
    <span class="w" style="font-family:var(--font-body);font-weight:600;">SemiBold 600</span>
  </div>
</div>
</body></html>
