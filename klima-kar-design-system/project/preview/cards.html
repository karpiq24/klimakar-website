<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-off-white); font-family: var(--font-body); padding: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-start; }
  .card { background: #fff; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden; width: 190px; }
  .card-header { background: var(--color-blue-700); padding: 14px 16px; }
  .card-header-icon { width: 28px; height: 28px; background: rgba(255,255,255,0.2); border-radius: 6px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; }
  .card-header h3 { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: #fff; line-height: 1.2; }
  .card-body { padding: 12px 16px 14px; }
  .card-body p { font-size: 12px; line-height: 1.5; color: var(--text-secondary); margin-bottom: 10px; }
  .card-link { font-size: 12px; font-weight: 600; color: var(--color-blue-700); }

  .card-flat { background: #fff; border-radius: var(--radius-md); border: 1px solid var(--color-dark-100); padding: 14px 16px; width: 190px; }
  .card-flat .tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-blue-700); margin-bottom: 6px; }
  .card-flat h4 { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
  .card-flat p { font-size: 12px; color: var(--text-secondary); line-height: 1.45; }

  .card-dark { background: var(--color-dark-900); border-radius: var(--radius-md); padding: 14px 16px; width: 190px; }
  .card-dark .tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-blue-400); margin-bottom: 6px; }
  .card-dark h4 { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .card-dark p { font-size: 12px; color: var(--color-dark-300); line-height: 1.45; }

  svg { display: block; }
</style>
</head><body>
<!-- Accent card -->
<div class="card">
  <div class="card-header">
    <div class="card-header-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    </div>
    <h3>Klimatyzacja</h3>
  </div>
  <div class="card-body">
    <p>Diagnostyka, napełnianie, odkażanie i regeneracja sprężarek.</p>
    <span class="card-link">Dowiedz się więcej →</span>
  </div>
</div>

<!-- Flat card -->
<div class="card-flat">
  <div class="tag">Ogrzewanie</div>
  <h4>Ogrzewacze Postojowe</h4>
  <p>Montaż i serwis niezależnych ogrzewaczy spalinowych i elektrycznych.</p>
</div>

<!-- Dark card -->
<div class="card-dark">
  <div class="tag">Autoryzowany</div>
  <h4>Serwis Webasto</h4>
  <p>Naprawy gwarancyjne i pogwarancyjne systemy ogrzewania Webasto.</p>
</div>
</body></html>
