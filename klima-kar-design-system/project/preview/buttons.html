<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-off-white); font-family: var(--font-body); padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-dark-300); width: 60px; flex-shrink: 0; }
  /* Base button */
  .btn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-body); font-weight: 600; border-radius: var(--radius-sm); border: none; cursor: pointer; transition: all 150ms ease-out; text-decoration: none; }
  /* Sizes */
  .btn-sm { font-size: 13px; padding: 6px 14px; }
  .btn-md { font-size: 14px; padding: 9px 20px; }
  .btn-lg { font-size: 15px; padding: 12px 28px; }
  /* Variants */
  .btn-primary { background: var(--color-blue-700); color: #fff; }
  .btn-primary:hover { background: var(--color-blue-800); }
  .btn-primary:active { background: var(--color-blue-900); transform: scale(0.98); }
  .btn-secondary { background: var(--color-dark-900); color: #fff; }
  .btn-secondary:hover { background: var(--color-dark-800); }
  .btn-outline { background: transparent; color: var(--color-blue-700); border: 1.5px solid var(--color-blue-700); }
  .btn-outline:hover { background: var(--color-blue-50); }
  .btn-ghost { background: transparent; color: var(--color-dark-800); }
  .btn-ghost:hover { background: var(--color-dark-50); }
  .btn-disabled { background: var(--color-dark-100); color: var(--color-dark-300); cursor: not-allowed; }
  .btn-danger { background: var(--color-error); color: #fff; }
</style>
</head><body>
<div class="row">
  <div class="label">Primary</div>
  <button class="btn btn-primary btn-sm">Zadzwoń</button>
  <button class="btn btn-primary btn-md">Umów serwis</button>
  <button class="btn btn-primary btn-lg">Skontaktuj się</button>
</div>
<div class="row">
  <div class="label">Secondary</div>
  <button class="btn btn-secondary btn-sm">Szczegóły</button>
  <button class="btn btn-secondary btn-md">Dowiedz się więcej</button>
</div>
<div class="row">
  <div class="label">Outline</div>
  <button class="btn btn-outline btn-sm">Sprawdź ofertę</button>
  <button class="btn btn-outline btn-md">Autoryzowany serwis</button>
</div>
<div class="row">
  <div class="label">Ghost</div>
  <button class="btn btn-ghost btn-sm">Anuluj</button>
  <button class="btn btn-ghost btn-md">Wróć</button>
</div>
<div class="row">
  <div class="label">States</div>
  <button class="btn btn-primary btn-md btn-disabled" disabled>Niedostępny</button>
  <button class="btn btn-danger btn-md">Zgłoś usterkę</button>
</div>
</body></html>
