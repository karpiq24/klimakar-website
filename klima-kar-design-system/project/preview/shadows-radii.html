<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-off-white); font-family: var(--font-body); padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .section { display: flex; gap: 10px; flex-wrap: wrap; }
  .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-dark-300); margin-bottom: 6px; }
  .shadow-box { background: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--color-dark-400); width: 90px; height: 56px; border-radius: 6px; }
  .radius-box { background: #fff; border: 1.5px solid var(--color-blue-700); width: 64px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--color-dark-600); }
</style>
</head><body>
<div>
  <div class="label">Shadows</div>
  <div class="section">
    <div><div class="shadow-box" style="box-shadow:var(--shadow-xs);">xs</div></div>
    <div><div class="shadow-box" style="box-shadow:var(--shadow-sm);">sm</div></div>
    <div><div class="shadow-box" style="box-shadow:var(--shadow-md);">md</div></div>
    <div><div class="shadow-box" style="box-shadow:var(--shadow-lg);">lg</div></div>
    <div><div class="shadow-box" style="box-shadow:var(--shadow-xl);">xl</div></div>
  </div>
</div>
<div>
  <div class="label">Border Radius</div>
  <div class="section">
    <div><div class="radius-box" style="border-radius:var(--radius-sm);">sm · 4px</div></div>
    <div><div class="radius-box" style="border-radius:var(--radius-md);">md · 6px</div></div>
    <div><div class="radius-box" style="border-radius:var(--radius-lg);">lg · 10px</div></div>
    <div><div class="radius-box" style="border-radius:var(--radius-xl);">xl · 16px</div></div>
    <div><div class="radius-box" style="border-radius:var(--radius-pill);width:80px;">pill</div></div>
  </div>
</div>
</body></html>
