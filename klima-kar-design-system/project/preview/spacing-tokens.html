<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: var(--font-body); padding: 16px; }
  .grid { display: flex; gap: 6px; align-items: flex-end; flex-wrap: wrap; }
  .token { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar { background: var(--color-blue-700); border-radius: 3px 3px 0 0; width: 32px; }
  .name { font-size: 10px; font-weight: 600; color: var(--color-dark-800); }
  .val { font-size: 9px; color: var(--color-dark-300); font-family: monospace; }
</style>
</head><body>
<div class="grid">
  <div class="token"><div class="bar" style="height:4px;opacity:0.3;"></div><div class="name">space-1</div><div class="val">4px</div></div>
  <div class="token"><div class="bar" style="height:8px;opacity:0.4;"></div><div class="name">space-2</div><div class="val">8px</div></div>
  <div class="token"><div class="bar" style="height:12px;opacity:0.5;"></div><div class="name">space-3</div><div class="val">12px</div></div>
  <div class="token"><div class="bar" style="height:16px;opacity:0.6;"></div><div class="name">space-4</div><div class="val">16px</div></div>
  <div class="token"><div class="bar" style="height:20px;opacity:0.65;"></div><div class="name">space-5</div><div class="val">20px</div></div>
  <div class="token"><div class="bar" style="height:24px;opacity:0.7;"></div><div class="name">space-6</div><div class="val">24px</div></div>
  <div class="token"><div class="bar" style="height:32px;opacity:0.75;"></div><div class="name">space-8</div><div class="val">32px</div></div>
  <div class="token"><div class="bar" style="height:40px;opacity:0.8;"></div><div class="name">space-10</div><div class="val">40px</div></div>
  <div class="token"><div class="bar" style="height:48px;opacity:0.85;"></div><div class="name">space-12</div><div class="val">48px</div></div>
  <div class="token"><div class="bar" style="height:64px;opacity:0.9;"></div><div class="name">space-16</div><div class="val">64px</div></div>
  <div class="token"><div class="bar" style="height:80px;opacity:0.95;"></div><div class="name">space-20</div><div class="val">80px</div></div>
  <div class="token"><div class="bar" style="height:96px;"></div><div class="name">space-24</div><div class="val">96px</div></div>
</div>
</body></html>
