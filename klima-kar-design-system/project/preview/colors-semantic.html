<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #fff; font-family: var(--font-body); padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; gap: 8px; align-items: stretch; }
  .chip { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--color-dark-100); flex: 1; }
  .dot { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; }
  .info { display: flex; flex-direction: column; }
  .role { font-size: 11px; font-weight: 600; color: var(--color-dark-800); }
  .val { font-size: 10px; color: var(--color-dark-400); font-family: monospace; }
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-dark-300); margin-bottom: -4px; }
</style>
</head><body>
<div class="section-label">Backgrounds</div>
<div class="row">
  <div class="chip"><div class="dot" style="background:var(--bg-page);border:1px solid #D0DDE5;"></div><div class="info"><span class="role">bg-page</span><span class="val">#F4F7FB</span></div></div>
  <div class="chip"><div class="dot" style="background:var(--bg-surface);border:1px solid #D0DDE5;"></div><div class="info"><span class="role">bg-surface</span><span class="val">#FFFFFF</span></div></div>
  <div class="chip"><div class="dot" style="background:var(--bg-dark);"></div><div class="info"><span class="role">bg-dark</span><span class="val">#0D1B2E</span></div></div>
  <div class="chip"><div class="dot" style="background:var(--bg-accent);"></div><div class="info"><span class="role">bg-accent</span><span class="val">#1C5EA6</span></div></div>
  <div class="chip"><div class="dot" style="background:var(--bg-accent-subtle);border:1px solid #D0DDE5;"></div><div class="info"><span class="role">bg-accent-subtle</span><span class="val">#F0F7FD</span></div></div>
</div>
<div class="section-label">Text</div>
<div class="row">
  <div class="chip"><div class="dot" style="background:var(--text-primary);"></div><div class="info"><span class="role">text-primary</span><span class="val">#1A2A3A</span></div></div>
  <div class="chip"><div class="dot" style="background:var(--text-secondary);"></div><div class="info"><span class="role">text-secondary</span><span class="val">#5A7080</span></div></div>
  <div class="chip"><div class="dot" style="background:var(--text-muted);"></div><div class="info"><span class="role">text-muted</span><span class="val">#7A94A8</span></div></div>
  <div class="chip"><div class="dot" style="background:var(--text-link);"></div><div class="info"><span class="role">text-link</span><span class="val">#1C5EA6</span></div></div>
</div>
<div class="section-label">Status</div>
<div class="row">
  <div class="chip" style="background:var(--color-success-bg);"><div class="dot" style="background:var(--color-success);border-radius:999px;"></div><div class="info"><span class="role">Success</span><span class="val">#1A8A4A</span></div></div>
  <div class="chip" style="background:var(--color-warning-bg);"><div class="dot" style="background:var(--color-warning);border-radius:999px;"></div><div class="info"><span class="role">Warning</span><span class="val">#B06800</span></div></div>
  <div class="chip" style="background:var(--color-error-bg);"><div class="dot" style="background:var(--color-error);border-radius:999px;"></div><div class="info"><span class="role">Error</span><span class="val">#C0271A</span></div></div>
</div>
</body></html>
