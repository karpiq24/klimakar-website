<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Klima-Kar — Website UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Barlow', sans-serif; transition: background 200ms; }
  img { display: block; max-width: 100%; }

  /* Logo color classes — global so all injected SVGs inherit */
  .logo-colored .st0 { fill: #1C5EA6; }
  .logo-colored .st1 { fill: #3388BF; }
  .logo-colored .st2 { fill: #40B0D9; }
  .logo-white .st0, .logo-white .st1, .logo-white .st2 { fill: #ffffff; }

  @media (max-width: 900px) {
    .nav-links-desktop { display: none !important; }
    .nav-hamburger { display: flex !important; }
    .hero-logo { display: none !important; }
    .contact-grid { grid-template-columns: 1fr !important; }
    .footer-grid { grid-template-columns: 1fr 1fr !important; }
    .form-row { grid-template-columns: 1fr !important; }
    .timeline-row { flex-direction: column !important; }
    .nav-mobile { display: flex !important; }
    .nav-desktop { display: none !important; }
    .about-grid { grid-template-columns: 1fr !important; }
    .services-cta { flex-direction: column !important; align-items: flex-start !important; }
  }
  @media (max-width: 900px) {
    section, header > nav, footer > div { padding-left: 20px !important; padding-right: 20px !important; }
    h1 { font-size: clamp(28px, 8vw, 48px) !important; }
    h2 { font-size: clamp(24px, 6vw, 38px) !important; }
  }
  @media (max-width: 480px) {
    section, footer > div { padding-left: 16px !important; padding-right: 16px !important; }
    .footer-grid { grid-template-columns: 1fr !important; gap: 24px !important; }
    .stats-row { gap: 16px !important; flex-wrap: wrap !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ServicesGrid.jsx"></script>
<script type="text/babel" src="Partners.jsx"></script>
<script type="text/babel" src="ContactSection.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="pages/OFirmie.jsx"></script>
<script type="text/babel" src="pages/Cennik.jsx"></script>
<script type="text/babel" src="pages/Klimatyzacja.jsx"></script>
<script type="text/babel" src="pages/OgrzewaniePosojowe.jsx"></script>

<script type="text/babel">

// ── About section (inline, simple) ─────────────────────────
const AboutSection = ({ theme, onNavigate }) => {
  const dark = theme === 'dark';
  const bg      = dark ? '#060D16' : '#fff';
  const cardBg  = dark ? '#162336' : '#F4F7FB';
  const headCol = dark ? '#E8EFF4' : '#0D1B2E';
  const subCol  = dark ? '#5A7080' : '#5A7080';
  const border  = dark ? 'rgba(255,255,255,0.08)' : '#E8EFF4';

  return (
    <section style={{ background: bg, padding: '72px 40px', transition: 'background 200ms' }} id="about">
      <div style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 64, alignItems: 'center' }} className="about-grid">
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.1em', color: '#3388BF', fontFamily: 'Barlow, sans-serif', marginBottom: 10 }}>O nas</div>
          <h2 style={{ fontFamily: 'Barlow Condensed, sans-serif', fontSize: 38, fontWeight: 700, color: headCol, lineHeight: 1.1, marginBottom: 20 }}>Firma rodzinna<br />z tradycją od 1989</h2>
          <p style={{ fontSize: 15, color: subCol, lineHeight: 1.65, fontFamily: 'Barlow, sans-serif', marginBottom: 14 }}>
            Jesteśmy firmą rodzinną z dwupokoleniową tradycją w branży chłodnictwa. W 1999 roku przyjęliśmy nazwę Klima-Kar i osiedliliśmy się na ul. Grota Roweckiego 129 we Wrocławiu.
          </p>
          <p style={{ fontSize: 15, color: subCol, lineHeight: 1.65, fontFamily: 'Barlow, sans-serif', marginBottom: 28 }}>
            Posiadamy autoryzacje Webasto, Eberspächer i DEFA — co gwarantuje najwyższy standard usług i oryginalne części zamienne. Tysiące udanych napraw i zadowolonych klientów.
          </p>
          <div style={{ display: 'flex', gap: 10 }}>
            <button onClick={() => onNavigate('about')}
              style={{ background: '#1C5EA6', color: '#fff', border: 'none', borderRadius: 4, padding: '10px 20px', fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'Barlow, sans-serif' }}>
              Historia firmy
            </button>
            <button onClick={() => onNavigate('contact')}
              style={{ background: 'transparent', color: '#1C5EA6', border: '1.5px solid #1C5EA6', borderRadius: 4, padding: '10px 20px', fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'Barlow, sans-serif' }}>
              Kontakt
            </button>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          {[['1989', 'Rok założenia'], ['1999', 'Nazwa Klima-Kar'], ['2008', 'Autoryzacja Webasto'], ['3', 'Autoryzacje partnerskie']].map(([val, lbl]) => (
            <div key={lbl} style={{ background: cardBg, border: `1px solid ${border}`, borderRadius: 6, padding: '22px 18px', textAlign: 'center', boxShadow: dark ? '0 2px 8px rgba(0,0,0,0.2)' : '0 2px 8px rgba(13,27,46,0.06)' }}>
              <div style={{ fontFamily: 'Barlow Condensed, sans-serif', fontSize: 34, fontWeight: 700, color: '#1C5EA6', lineHeight: 1 }}>{val}</div>
              <div style={{ fontSize: 12, color: subCol, fontFamily: 'Barlow, sans-serif', marginTop: 6, lineHeight: 1.3 }}>{lbl}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

// ── Page breadcrumb ─────────────────────────────────────────
const Breadcrumb = ({ page, onNavigate, theme }) => {
  const dark = theme === 'dark';
  const labels = { services: 'Klimatyzacja', heating: 'Ogrzewanie postojowe', about: 'O firmie', prices: 'Cennik', contact: 'Kontakt' };
  if (page === 'home') return null;
  return (
    <div style={{ background: dark ? '#0A1828' : '#E8EFF4', padding: '10px 40px', borderBottom: `1px solid ${dark ? 'rgba(255,255,255,0.06)' : '#D0DDE5'}` }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', gap: 8, alignItems: 'center', fontFamily: 'Barlow, sans-serif', fontSize: 13 }}>
        <a href="#" onClick={e => { e.preventDefault(); onNavigate('home'); }} style={{ color: '#3388BF', textDecoration: 'none' }}>Strona główna</a>
        <span style={{ color: dark ? '#3A5068' : '#A8BEC9' }}>›</span>
        <span style={{ color: dark ? '#5A7080' : '#5A7080' }}>{labels[page] || page}</span>
      </div>
    </div>
  );
};

// ── App ─────────────────────────────────────────────────────
// (App logic moved into AppWrapper below for postMessage support)

// Expose navigation + theme setters for showcase iframe control
let __appSetPage = null;
let __appSetTheme = null;
window.__setPage  = (p) => __appSetPage  && __appSetPage(p);
window.__setTheme = (t) => __appSetTheme && __appSetTheme(t);

// Listen for postMessage from showcase
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'kk-navigate') {
    if (e.data.page  !== undefined) window.__setPage(e.data.page);
    if (e.data.theme !== undefined) window.__setTheme(e.data.theme);
  }
});

const AppWrapper = () => {
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const [theme, setTheme] = React.useState(
    localStorage.getItem('kk-theme') || (prefersDark ? 'dark' : 'light')
  );
  const [page, setPage] = React.useState('home');

  // Expose to parent
  React.useEffect(() => {
    __appSetPage  = setPage;
    __appSetTheme = (t) => { setTheme(t); localStorage.setItem('kk-theme', t); };
    window.parent.postMessage({ type: 'kk-ready' }, '*');
  }, []);

  React.useEffect(() => {
    document.body.setAttribute('data-theme', theme);
    document.body.style.background = theme === 'dark' ? '#0D1B2E' : '#F4F7FB';
    localStorage.setItem('kk-theme', theme);
  }, [theme]);

  const navigate = (target) => { setPage(target); window.scrollTo({ top: 0, behavior: 'smooth' }); };
  const toggleTheme = () => setTheme(t => { const next = t === 'dark' ? 'light' : 'dark'; localStorage.setItem('kk-theme', next); return next; });

  const renderPage = () => {
    const props = { theme, onNavigate: navigate };
    switch (page) {
      case 'services': return <Klimatyzacja {...props} />;
      case 'heating':  return <OgrzewaniePosojowe {...props} />;
      case 'about':    return <OFirmie {...props} />;
      case 'prices':   return <Cennik {...props} />;
      case 'contact':  return <ContactSection {...props} />;
      default: return (
        <>
          <Hero theme={theme} onNavigate={navigate} />
          <ServicesGrid theme={theme} onNavigate={navigate} />
          <Partners theme={theme} />
          <AboutSection theme={theme} onNavigate={navigate} />
          <ContactSection theme={theme} />
        </>
      );
    }
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Header currentPage={page} onNavigate={navigate} theme={theme} onToggleTheme={toggleTheme} />
      <Breadcrumb page={page} onNavigate={navigate} theme={theme} />
      <main style={{ flex: 1 }}>{renderPage()}</main>
      <Footer theme={theme} onNavigate={navigate} />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AppWrapper />);
</script>
</body>
</html>
